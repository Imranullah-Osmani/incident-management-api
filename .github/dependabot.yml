version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kabul"
    open-pull-requests-limit: 5
    groups:
      api-runtime:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "sqlalchemy"
          - "pydantic*"
      async-runtime:
        patterns:
          - "celery"
          - "redis"
          - "psycopg*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Asia/Kabul"
    open-pull-requests-limit: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "Asia/Kabul"
    open-pull-requests-limit: 3
