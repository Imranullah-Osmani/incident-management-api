<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Incident Management API preview</title>
  <desc id="desc">A clean preview of a FastAPI incident console with tickets, lifecycle transitions, role visibility, Redis Celery notifications, and readiness checks.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1400" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06111E"/>
      <stop offset="1" stop-color="#13213A"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0891B2"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4338CA"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1400" height="820" rx="34" fill="url(#page)"/>
  <rect x="54" y="52" width="1292" height="716" rx="30" fill="#0B1526" stroke="#29415F" stroke-width="2" filter="url(#shadow)"/>

  <rect x="92" y="104" width="332" height="612" rx="24" fill="#09111F" stroke="#223A57" stroke-width="2"/>
  <text x="126" y="166" fill="#F8FAFC" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Incident API</text>
  <text x="126" y="206" fill="#67E8F9" font-size="18" font-family="Segoe UI, Arial, sans-serif">FastAPI + Redis + Celery</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#CBD5E1">
    <text x="126" y="282">Ticket creation</text>
    <text x="126" y="336">Status lifecycle</text>
    <text x="126" y="390">Role visibility</text>
    <text x="126" y="444">Async notifications</text>
    <text x="126" y="498">Health readiness</text>
    <text x="126" y="552">Case-study sample</text>
  </g>
  <g fill="#22D3EE">
    <circle cx="106" cy="274" r="6"/>
    <circle cx="106" cy="328" r="6"/>
    <circle cx="106" cy="382" r="6"/>
    <circle cx="106" cy="436" r="6"/>
    <circle cx="106" cy="490" r="6"/>
    <circle cx="106" cy="544" r="6"/>
  </g>

  <rect x="468" y="104" width="794" height="102" rx="24" fill="#11243A" stroke="#315170" stroke-width="2"/>
  <text x="506" y="165" fill="#F8FAFC" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Support Ticket and Incident Console</text>

  <rect x="468" y="244" width="242" height="164" rx="22" fill="url(#amber)"/>
  <rect x="742" y="244" width="242" height="164" rx="22" fill="url(#cyan)"/>
  <rect x="1016" y="244" width="246" height="164" rx="22" fill="url(#violet)"/>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="502" y="300" fill="#FFF7ED" font-size="26" font-weight="700">Tickets</text>
    <text x="502" y="342" fill="#FFEDD5" font-size="19">create and assign</text>
    <text x="502" y="374" fill="#FFEDD5" font-size="19">timeline events</text>

    <text x="776" y="300" fill="#ECFEFF" font-size="26" font-weight="700">Lifecycle</text>
    <text x="776" y="342" fill="#CFFAFE" font-size="19">acknowledge</text>
    <text x="776" y="374" fill="#CFFAFE" font-size="19">investigate / resolve</text>

    <text x="1050" y="300" fill="#F5F3FF" font-size="26" font-weight="700">Async Ops</text>
    <text x="1050" y="342" fill="#DDD6FE" font-size="19">Redis broker</text>
    <text x="1050" y="374" fill="#DDD6FE" font-size="19">Celery worker</text>
  </g>

  <rect x="468" y="448" width="794" height="268" rx="24" fill="#09111F" stroke="#223A57" stroke-width="2"/>
  <text x="506" y="506" fill="#F8FAFC" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Operational API Flow</text>
  <g font-family="Cascadia Code, Consolas, monospace" font-size="21">
    <rect x="506" y="542" width="100" height="34" rx="8" fill="#1D4ED8"/>
    <text x="522" y="566" fill="#EFF6FF">POST</text>
    <text x="628" y="566" fill="#BAE6FD">/auth/login</text>

    <rect x="506" y="590" width="100" height="34" rx="8" fill="#1D4ED8"/>
    <text x="522" y="614" fill="#EFF6FF">POST</text>
    <text x="628" y="614" fill="#BAE6FD">/tickets</text>

    <rect x="506" y="638" width="100" height="34" rx="8" fill="#0F766E"/>
    <text x="520" y="662" fill="#ECFDF5">PATCH</text>
    <text x="628" y="662" fill="#BAE6FD">/tickets/{id}/status</text>
  </g>
</svg>
